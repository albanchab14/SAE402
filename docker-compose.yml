# ============================================================
# MARA SAE402 — Docker Compose pour Coolify
# ============================================================

services:

  # --- Application (Nginx + PHP-FPM + Frontend) ---
  app:
    build: .
    ports:
      - "80"
    environment:
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME:-sae402}
      - DB_USER=${DB_USER:-mara_user}
      - DB_PASS=${DB_PASS:-secret}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # --- Base de donnees MySQL ---
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-sae402}
      MYSQL_USER: ${DB_USER:-mara_user}
      MYSQL_PASSWORD: ${DB_PASS:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api/db_setup.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./api/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
