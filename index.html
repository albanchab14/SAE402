<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAE402 - PlayCanvas Project</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
        }
        #application-container {
            width: 100vw;
            height: 100vh;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #debug-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 200px;
        }
        /* Info Tab Style */
        #info-tab {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%) translateX(-120%);
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }
        #info-tab.active {
            transform: translateY(-50%) translateX(0);
        }
        .info-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #6366f1;
        }
        .info-body {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .close-btn:hover {
            opacity: 1;
        }
        .db-status {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h1>SAE 402 - AR Visualiser</h1>
        <div class="status-badge">Mode Scan Actif</div>
    </div>

    <!-- Info Tab (Hidden by default) -->
    <div id="info-tab">
        <div class="close-btn" onclick="document.getElementById('info-tab').classList.remove('active')">✕</div>
        <div class="info-title" id="tab-title">Hotspot Title</div>
        <div class="info-body" id="tab-body">
            Description of the scanned point will appear here.
        </div>
    </div>

    <div id="application-container">
        <canvas id="application-canvas"></canvas>
    </div>

    <div id="debug-panel">
        <strong>Database Sync</strong><br>
        Status: <span id="db-status-text" class="status-badge" style="margin-top: 5px; background: none; border: none; padding: 0;">Checking...</span><br>
        Last Update: <span id="last-update">--:--:--</span>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
