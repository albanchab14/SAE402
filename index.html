<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARA - Maintenance AR Robot UR5e</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>

    <!-- ── Écran de chargement ──────────────────────────────────────────────── -->
    <div id="loading-screen">
        <div class="loading-logo">MARA</div>
        <div class="loading-bar-track">
            <div class="loading-bar-fill" id="loading-progress"></div>
        </div>
        <div id="loading-status">Chargement...</div>
    </div>

    <!-- ── Overlay haut gauche : titre + badge statut API ───────────────────── -->
    <div id="ui-overlay">
        <h1>MARA — UR5e</h1>
        <div class="status-badge ar-active">Maintenance AR</div>
    </div>

    <!-- ── Bouton bascule Viewer 3D / AR (haut droite) ──────────────────────── -->
    <button id="mode-toggle">Mode AR</button>

    <!-- ── Canvas Three.js ──────────────────────────────────────────────────── -->
    <!-- Toujours visible : fond sombre en viewer 3D, transparent en mode XR -->
    <canvas id="viewer-canvas"></canvas>

    <!-- ── Aide navigation viewer 3D ────────────────────────────────────────── -->
    <div id="viewer-hint">
        🖱️ Clic + glisser — Orbiter<br>
        🖱️ Molette — Zoom<br>
        🖱️ Clic droit — Panoramique
    </div>

    <!-- ── Overlay WebXR (dom-overlay) ──────────────────────────────────────── -->
    <!-- Affiché par-dessus le flux caméra AR natif quand la session XR est active.
         L'id 'ar-overlay' est passé comme domOverlay.root dans startXRSession(). -->
    <div id="ar-overlay">
        <!-- Instructions avant placement du robot -->
        <div id="ar-hint">
            <div class="ar-hint-icon">📷</div>
            <p>Pointez la caméra vers<br>une surface plane (table, sol…)<br>puis <strong>tapez</strong> pour poser le robot</p>
        </div>
        <!-- Bouton quitter AR -->
        <button id="ar-quit-btn">✕ Quitter AR</button>
    </div>

    <!-- ── Panneau fiche technique ───────────────────────────────────────────── -->
    <div id="info-panel">
        <button class="close-btn">&times;</button>

        <div class="panel-header">
            <div class="part-icon">&#9881;</div>
            <div>
                <h2 id="panel-title">Composant</h2>
                <span id="panel-category" class="badge">Catégorie</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="general">Général</button>
            <button class="tab"        data-tab="specs">Specs</button>
            <button class="tab"        data-tab="docs">Documents</button>
            <button class="tab"        data-tab="maintenance">Maintenance</button>
        </div>

        <div id="tab-general"     class="tab-content active"><p id="panel-description"></p></div>
        <div id="tab-specs"       class="tab-content"><table id="specs-table" class="specs-table"></table></div>
        <div id="tab-docs"        class="tab-content"><div id="docs-list"></div></div>
        <div id="tab-maintenance" class="tab-content"><div id="maintenance-info"></div></div>

        <button id="ask-ai-btn">&#9733; Poser une question à l'IA</button>
    </div>

    <!-- ── Bouton flottant chat ──────────────────────────────────────────────── -->
    <button id="chat-toggle" title="Assistant IA MARA">&#9733;</button>

    <!-- ── Panneau chat assistant IA ────────────────────────────────────────── -->
    <div id="chat-panel">
        <div class="chat-header">
            <span>&#9733; Assistant MARA</span>
            <button>&times;</button>
        </div>
        <div class="chat-context" id="chat-context">Contexte : Général UR5e</div>
        <div id="chat-messages"></div>
        <div id="chat-faq"></div>
        <div class="chat-input-zone">
            <input type="text" id="chat-input" placeholder="Posez votre question…" autocomplete="off">
            <button id="chat-send-btn">Envoyer</button>
        </div>
    </div>

    <!-- ── Indicateur statut (bas droite) ───────────────────────────────────── -->
    <div id="marker-indicator">
        <div class="indicator-dot"></div>
        <span id="marker-status">Viewer 3D</span>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
