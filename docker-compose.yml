# ============================================================
# MARA SAE402 — Docker Compose (déploiement Coolify)
#
# Services :
#   app   → Nginx + PHP-FPM (frontend + backend)
#   mysql → MariaDB (base de données)
#
# Variables d'environnement à configurer dans Coolify :
#   DB_HOST, DB_NAME, DB_USER, DB_PASS, DB_ROOT_PASS
#   GEMINI_API_KEY, GEMINI_MODEL
# ============================================================

services:

  # --- Application (Nginx + PHP-FPM) ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_NAME=${DB_NAME:-sae402}
      - DB_USER=${DB_USER:-mara_user}
      - DB_PASS=${DB_PASS:-changeme}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
    ports:
      - "80:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mara-network

  # --- Base de données MariaDB ---
  mysql:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootchangeme}
      MYSQL_DATABASE: ${DB_NAME:-sae402}
      MYSQL_USER: ${DB_USER:-mara_user}
      MYSQL_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      # Données persistantes
      - mysql_data:/var/lib/mysql
      # Scripts d'initialisation (exécutés uniquement au premier démarrage)
      - ./api/db_setup.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./api/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mara-network

volumes:
  mysql_data:
    driver: local

networks:
  mara-network:
    driver: bridge
