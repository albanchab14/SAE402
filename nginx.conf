# ============================================================
# MARA SAE402 — Configuration Nginx (production)
#
# Remplace le Vite dev server + le proxy PHP de développement.
# Coolify/Traefik gère le SSL en amont → Nginx écoute sur 80.
# ============================================================

server {
    listen 80;
    server_name _;

    # Frontend : fichiers statiques buildés par Vite
    root /var/www/html;
    index index.html;

    # Taille max upload (pour d'éventuels envois de fichiers)
    client_max_body_size 50M;

    # --- Frontend (SPA) ---
    # Toute URL qui ne matche pas /api ou /docs → renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Backend PHP API ---
    # /api/* est redirigé vers PHP-FPM
    # Le frontend appelle /api/api.php?action=get_parts
    location ~ ^/api/(.+\.php)$ {
        alias /var/www/api/$1;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index api.php;
        fastcgi_param SCRIPT_FILENAME /var/www/api/$1;
        include fastcgi_params;
    }

    # --- Documents PDF ---
    # /docs/* sert les fichiers depuis /var/www/docs/
    location /docs/ {
        alias /var/www/docs/;
        add_header Content-Type application/pdf;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- Fichiers statiques : cache agressif ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|glb|gltf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Modèle 3D : headers spécifiques ---
    location ~* \.glb$ {
        add_header Content-Type "model/gltf-binary";
        expires 30d;
    }

    # Pas de logs pour favicon (réduit le bruit)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Sécurité : bloque l'accès aux fichiers cachés
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
