<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARA - Maintenance AR Robot UR5e</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- AR.js pour A-Frame (Image Tracking) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- A-Frame Extras : orbit-controls pour le viewer 3D -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>

    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo">MARA</div>
        <div class="loading-bar-track">
            <div class="loading-bar-fill" id="loading-progress"></div>
        </div>
        <div id="loading-status">Chargement...</div>
    </div>

    <!-- Top Overlay -->
    <div id="ui-overlay">
        <h1>MARA - UR5e</h1>
        <div class="status-badge ar-active">Maintenance AR</div>
    </div>

    <!-- Mode Toggle -->
    <button id="mode-toggle">Mode Viewer 3D</button>

    <!-- Scene A-Frame AR -->
    <a-scene
        id="ar-scene"
        embedded
        arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        vr-mode-ui="enabled: false"
        loading-screen="enabled: false">

        <!-- Assets (prechargement) -->
        <a-assets>
            <a-asset-item id="robot-model" src="/models/UR5e.glb"></a-asset-item>
        </a-assets>

        <!--
          Marqueur AR :
          - Pour test rapide sans impression : changer en <a-marker preset="hiro">
          - Pour demo finale : garder pattern + imprimer /markers/pattern-marker.patt
          Generateur de marqueur : https://ar-js-org.github.io/AR.js/three.js/examples/marker-training/
        -->
        <a-marker type="pattern" url="/markers/pattern-marker.patt" smooth="true" smoothCount="5" smoothTolerance="0.01">

            <!-- Modele 3D du robot UR5e -->
            <a-entity
                id="robot"
                gltf-model="#robot-model"
                scale="0.01 0.01 0.01"
                position="0 0 0"
                rotation="0 0 0">
            </a-entity>

            <!-- Hotspots sont generes dynamiquement par main.js -->

        </a-marker>

        <!-- Camera AR avec curseur -->
        <a-entity camera look-controls="enabled: false">
            <a-cursor
                fuse="false"
                raycaster="objects: .clickable"
                color="#6366f1"
                scale="0.5 0.5 0.5">
            </a-cursor>
        </a-entity>

    </a-scene>

    <!-- Viewer 3D Three.js (canvas natif, fiable) -->
    <canvas id="viewer-canvas" style="
        display: none;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background: #0d0d1a;
    "></canvas>

    <!-- Aide navigation viewer -->
    <div id="viewer-hint" style="
        display: none;
        position: fixed; bottom: 80px; right: 20px;
        background: rgba(12,12,20,0.85); backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; padding: 12px 16px;
        font-size: 11px; color: rgba(255,255,255,0.4);
        z-index: 100; line-height: 1.8;
        pointer-events: none;">
        🖱️ Clic + glisser — Orbiter<br>
        🖱️ Molette — Zoom<br>
        🖱️ Clic droit + glisser — Panoramique
    </div>

    <!-- Info Panel (Fiche technique) -->
    <div id="info-panel">
        <button class="close-btn">&times;</button>

        <div class="panel-header">
            <div class="part-icon">&#9881;</div>
            <div>
                <h2 id="panel-title">Nom composant</h2>
                <span id="panel-category" class="badge">Identification</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="general">General</button>
            <button class="tab" data-tab="specs">Specs</button>
            <button class="tab" data-tab="docs">Documents</button>
            <button class="tab" data-tab="maintenance">Maintenance</button>
        </div>

        <div id="tab-general" class="tab-content active">
            <p id="panel-description"></p>
        </div>
        <div id="tab-specs" class="tab-content">
            <table id="specs-table" class="specs-table"></table>
        </div>
        <div id="tab-docs" class="tab-content">
            <div id="docs-list"></div>
        </div>
        <div id="tab-maintenance" class="tab-content">
            <div id="maintenance-info"></div>
        </div>

        <button id="ask-ai-btn">&#9733; Poser une question a l'IA</button>
    </div>

    <!-- Chat Toggle -->
    <button id="chat-toggle" title="Assistant IA">&#9733;</button>

    <!-- Chat Panel -->
    <div id="chat-panel">
        <div class="chat-header">
            <span>&#9733; Assistant MARA</span>
            <button>&times;</button>
        </div>
        <div class="chat-context" id="chat-context">Contexte : General UR5e</div>
        <div id="chat-messages"></div>
        <div id="chat-faq"></div>
        <div class="chat-input-zone">
            <input type="text" id="chat-input" placeholder="Posez votre question..." autocomplete="off">
            <button id="chat-send-btn">Envoyer</button>
        </div>
    </div>

    <!-- Marker Detection Indicator -->
    <div id="marker-indicator">
        <div class="indicator-dot"></div>
        <span id="marker-status">Recherche marqueur...</span>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
